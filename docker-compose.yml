version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: ecos_postgres
    environment:
      POSTGRES_USER: ecosadmin
      POSTGRES_PASSWORD: ecospassword
      POSTGRES_DB: ecosdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ecos_redis
    ports:
      - "6379:6379"

  mongo:
    image: mongo:6
    container_name: ecos_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ecosmongo
      MONGO_INITDB_ROOT_PASSWORD: ecosmongopassword
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
